name: Manual Build
on: [workflow_dispatch]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install ash
        run: |
          sudo apt-get update
          sudo apt-get install -y ash
      - name: Install dash
        run: |
          sudo apt-get update
          sudo apt-get install -y dash
      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish
      - name: Install ksh
        run: |
          sudo apt-get update
          sudo apt-get install -y ksh
      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
      - name: Install zip
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven
      - name: Build
        run: ./mvnw -B clean verify
      - name: Run Examples
        run: ./pipeliner examples/examples.plr
